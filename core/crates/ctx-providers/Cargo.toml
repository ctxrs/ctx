[package]
name = "ctx-providers"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
ctx-crp-protocol = { path = "../ctx-crp-protocol" }
ctx-core = { path = "../ctx-core" }
ctx-sandbox-contract = { path = "../ctx-sandbox-contract" }
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true
uuid.workspace = true
base64 = "0.22"
chrono.workspace = true
shlex = "1.3"
sha2 = "0.10"

[dev-dependencies]
tempfile = "3"
rand = "0.8"

[target.'cfg(target_os = "macos")'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = ["Win32_Foundation", "Win32_System_JobObjects", "Win32_System_SystemInformation", "Win32_System_Threading"] }

[features]
fuzz_tests = []
